<div class="d-flex justify-content-between align-items-start mb-1">
    <div>
        <h1 class="h4 mb-1">Reporte - Reposición sugerida</h1>
        <p class="text-muted small mb-0">Estima el consumo y sugiere cuánto comprar según el historial de salidas.</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" id="btn-excel"><i
                class="bi bi-file-earmark-spreadsheet me-1"></i>Excel</button>
        <button class="btn btn-sm btn-outline-secondary" id="btn-pdf"><i
                class="bi bi-file-earmark-pdf me-1"></i>PDF</button>
    </div>
</div>

<div id="tarjetas-reposicion" class="mt-3"></div>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-funnel me-1"></i>Parámetros y filtros</div>
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-2">
                <label class="form-label small">Ventana de análisis</label>
                <select class="form-select form-select-sm" id="f-ventana">
                    <option value="7">Últimos 7 días</option>
                    <option value="15">Últimos 15 días</option>
                    <option value="30" selected>Últimos 30 días</option>
                    <option value="60">Últimos 60 días</option>
                    <option value="90">Últimos 90 días</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Cobertura objetivo</label>
                <select class="form-select form-select-sm" id="f-cobertura">
                    <option value="15">15 días</option>
                    <option value="30" selected>30 días</option>
                    <option value="45">45 días</option>
                    <option value="60">60 días</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small">Buscar</label>
                <input type="text" class="form-control form-control-sm" id="f-buscar" placeholder="Producto…">
            </div>
            <div class="col-md-3">
                <label class="form-label small">Categoría</label>
                <select class="form-select form-select-sm" id="f-categoria">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="col-md-2">
                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="f-solo">
                    <label class="form-check-label small" for="f-solo">Solo con sugerencia</label>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-bar-chart me-1"></i>Unidades sugeridas a comprar</div>
    <div class="card-body"><canvas id="grafico-reposicion" style="max-height: 260px;"></canvas></div>
</div>

<div class="card">
    <div class="card-header"><i class="bi bi-list-ul me-1"></i>Detalle de productos</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th class="text-end">Stock</th>
                    <th class="text-end">Consumo/día</th>
                    <th class="text-end">Días restantes</th>
                    <th class="text-end">Sugerido comprar</th>
                    <th class="text-center">Urgencia</th>
                </tr>
            </thead>
            <tbody id="tabla-reposicion"></tbody>
        </table>
    </div>
</div>
