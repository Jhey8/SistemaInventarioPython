<div class="d-flex justify-content-between align-items-start mb-1">
    <div>
        <h1 class="h4 mb-1">Reporte - Vencimientos</h1>
        <p class="text-muted small mb-0">Productos perecederos vencidos o próximos a vencer.</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" id="btn-excel"><i class="bi bi-file-earmark-spreadsheet me-1"></i>Excel</button>
        <button class="btn btn-sm btn-outline-secondary" id="btn-pdf"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</button>
    </div>
</div>

<div id="tarjetas-vencimientos" class="mt-3"></div>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-funnel me-1"></i>Filtros</div>
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small">Alertar si vence en</label>
                <select class="form-select form-select-sm" id="f-dias">
                    <option value="7">7 días</option>
                    <option value="15">15 días</option>
                    <option value="30" selected>30 días</option>
                    <option value="60">60 días</option>
                    <option value="90">90 días</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small">Estado</label>
                <select class="form-select form-select-sm" id="f-estado">
                    <option value="">Todos</option>
                    <option value="VENCIDO">Vencidos</option>
                    <option value="POR VENCER">Por vencer</option>
                    <option value="VIGENTE">Vigentes</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small">Buscar</label>
                <input type="text" class="form-control form-control-sm" id="f-buscar" placeholder="Producto…">
            </div>
            <div class="col-md-3">
                <label class="form-label small">Categoría</label>
                <select class="form-select form-select-sm" id="f-categoria"><option value="">Todas</option></select>
            </div>
        </div>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-pie-chart me-1"></i>Distribución</div>
    <div class="card-body d-flex justify-content-center">
        <canvas id="grafico-vencimientos" style="max-height: 240px;"></canvas>
    </div>
</div>

<div class="card">
    <div class="card-header"><i class="bi bi-list-ul me-1"></i>Detalle de perecederos</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th class="text-end">Stock</th>
                    <th class="text-center">Vence</th>
                    <th class="text-end">Días restantes</th>
                    <th class="text-center">Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-vencimientos"></tbody>
        </table>
    </div>
</div>
