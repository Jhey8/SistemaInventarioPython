<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Proveedores</h1>
    <button class="btn btn-marca btn-sm" id="btn-nuevo-prov">
        <i class="bi bi-plus-lg me-1"></i>Nuevo proveedor
    </button>
</div>

<div id="tarjetas-proveedores"></div>

<div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span><i class="bi bi-truck me-1"></i>Listado de proveedores</span>
        <div class="input-group input-group-buscar" style="max-width: 360px;">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="buscador-prov" placeholder="Buscar por nombre o RUC">
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Proveedor</th>
                    <th>RUC</th>
                    <th>Representante</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th class="text-center">Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-proveedores"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modal-proveedor" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h6" id="titulo-prov">Nuevo proveedor</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger d-none" id="error-prov"></div>
                <form id="form-proveedor">
                    <input type="hidden" id="prov-id">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Nombre / Razón social</label>
                            <input type="text" class="form-control" id="prov-nombre">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">RUC <span class="text-muted small">(11 díg.)</span></label>
                            <input type="text" class="form-control" id="prov-ruc" maxlength="11">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Representante <span class="text-muted small">(opcional)</span></label>
                            <input type="text" class="form-control" id="prov-representante">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Teléfono <span class="text-muted small">(opcional)</span></label>
                            <input type="text" class="form-control" id="prov-telefono">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo <span class="text-muted small">(opcional)</span></label>
                        <input type="email" class="form-control" id="prov-correo">
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Dirección <span class="text-muted small">(opcional)</span></label>
                        <input type="text" class="form-control" id="prov-direccion">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-marca" id="btn-guardar-prov">Guardar</button>
            </div>
        </div>
    </div>
</div>
