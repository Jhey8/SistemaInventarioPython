<h1 class="h4 mb-1">Panel general</h1>
<p class="text-muted small mb-4">Resumen del inventario al día de hoy.</p>

<div id="alerta-vencimientos"></div>

<div class="row g-3 mb-4">
    <div class="col-12 col-sm-6 col-lg">
        <div class="card tarjeta-stat h-100">
            <div class="stat-cab"><span class="stat-label">Productos</span><i class="bi bi-boxes stat-ic"></i></div>
            <div class="stat-valor" id="stat-total">–</div>
        </div>
    </div>
    <div class="col-12 col-sm-6 col-lg">
        <div class="card tarjeta-stat h-100">
            <div class="stat-cab"><span class="stat-label">Unidades en stock</span><i class="bi bi-stack stat-ic"></i></div>
            <div class="stat-valor" id="stat-unidades">–</div>
        </div>
    </div>
    <div class="col-12 col-sm-6 col-lg">
        <div class="card tarjeta-stat h-100">
            <div class="stat-cab"><span class="stat-label">Valor total</span><i class="bi bi-cash-stack stat-ic"></i></div>
            <div class="stat-valor" id="stat-valor">–</div>
        </div>
    </div>
    <div class="col-12 col-sm-6 col-lg">
        <div class="card tarjeta-stat h-100">
            <div class="stat-cab"><span class="stat-label">Bajo stock</span><i class="bi bi-exclamation-triangle stat-ic"></i></div>
            <div class="stat-valor" id="stat-bajo">–</div>
        </div>
    </div>
    <div class="col-12 col-sm-6 col-lg">
        <div class="card tarjeta-stat h-100">
            <div class="stat-cab"><span class="stat-label">Categorías</span><i class="bi bi-tags stat-ic"></i></div>
            <div class="stat-valor" id="stat-categorias">–</div>
        </div>
    </div>
</div>

<div class="row g-3 mb-3">
    <div class="col-lg-5">
        <div class="card h-100">
            <div class="card-header"><i class="bi bi-pie-chart me-1"></i>Valor por categoría</div>
            <div class="card-body d-flex justify-content-center">
                <canvas id="grafico-categorias" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-7">
        <div class="card h-100">
            <div class="card-header"><i class="bi bi-graph-up me-1"></i>Movimientos por mes</div>
            <div class="card-body">
                <canvas id="grafico-mes" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-lg-6">
        <div class="card h-100">
            <div class="card-header"><i class="bi bi-exclamation-triangle me-1"></i>Productos bajo stock</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th class="text-end">Stock</th>
                            <th class="text-end">Mínimo</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-bajo-stock"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card h-100">
            <div class="card-header"><i class="bi bi-clock-history me-1"></i>Últimos movimientos</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Fecha</th>
                            <th>Producto</th>
                            <th class="text-center">Tipo</th>
                            <th class="text-end">Cant.</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-ultimos"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
