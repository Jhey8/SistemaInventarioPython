<div class="d-flex justify-content-between align-items-start mb-1">
    <div>
        <h1 class="h4 mb-1">Reporte - Productos bajo stock</h1>
        <p class="text-muted small mb-0">Productos cuyo stock está en o por debajo del mínimo definido.</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" id="btn-excel"><i class="bi bi-file-earmark-spreadsheet me-1"></i>Excel</button>
        <button class="btn btn-sm btn-outline-secondary" id="btn-pdf"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</button>
    </div>
</div>

<div id="tarjetas-bajo" class="mt-3"></div>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-bar-chart me-1"></i>Mayores faltantes</div>
    <div class="card-body"><canvas id="grafico-bajo" style="max-height: 260px;"></canvas></div>
</div>

<div class="card mb-4">
    <div class="card-header bg-white fw-medium"><i class="bi bi-funnel me-1"></i>Filtros</div>
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small">Buscar</label>
                <input type="text" class="form-control form-control-sm" id="f-buscar" placeholder="Producto…">
            </div>
            <div class="col-md-3">
                <label class="form-label small">Categoría</label>
                <select class="form-select form-select-sm" id="f-categoria"><option value="">Todas</option></select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Ordenar por</label>
                <select class="form-select form-select-sm" id="f-orden">
                    <option value="faltante">Faltante</option>
                    <option value="cantidad">Stock actual</option>
                    <option value="nombre">Nombre</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Faltante mínimo</label>
                <input type="number" min="0" class="form-control form-control-sm" id="f-min" placeholder="0">
            </div>
            <div class="col-md-2">
                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="f-sinstock">
                    <label class="form-check-label small" for="f-sinstock">Solo sin stock</label>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header"><i class="bi bi-list-ul me-1"></i>Productos bajo stock</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th class="text-end">Stock actual</th>
                    <th class="text-end">Stock mínimo</th>
                    <th class="text-end">Faltante</th>
                    <th class="text-center">Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-bajo"></tbody>
        </table>
    </div>
</div>
