<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Categorías</h1>
    <button class="btn btn-marca btn-sm" id="btn-nueva-cat">
        <i class="bi bi-plus-lg me-1"></i>Nueva categoría
    </button>
</div>

<div id="tarjetas-categorias"></div>

<div class="card">
    <div class="card-header"><i class="bi bi-tags me-1"></i>Listado de categorías</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th class="text-center">Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-categorias"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modal-categoria" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h6" id="titulo-cat">Nueva categoría</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger d-none" id="error-cat"></div>
                <form id="form-categoria">
                    <input type="hidden" id="cat-id">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="cat-nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción <span class="text-muted small">(opcional)</span></label>
                        <input type="text" class="form-control" id="cat-descripcion">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-marca" id="btn-guardar-cat">Guardar</button>
            </div>
        </div>
    </div>
</div>
