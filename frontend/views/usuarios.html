<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Usuarios</h1>
    <button class="btn btn-marca btn-sm" id="btn-nuevo-usuario">
        <i class="bi bi-plus-lg me-1"></i>Nuevo usuario
    </button>
</div>

<div id="tarjetas-usuarios"></div>

<div class="card">
    <div class="card-header"><i class="bi bi-people me-1"></i>Listado de usuarios</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Perfil</th>
                    <th class="text-center">Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-usuarios"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modal-usuario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h6" id="titulo-usuario">Nuevo usuario</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger d-none" id="error-usuario"></div>
                <form id="form-usuario">
                    <input type="hidden" id="usuario-id">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Usuario <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="usuario-usuario"
                                   maxlength="80" autocomplete="off" placeholder="Ej. jperez">
                            <div class="form-text">Letras, números, punto, guion y guion bajo.</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre <span class="text-muted small">(opcional)</span></label>
                            <input type="text" class="form-control" id="usuario-nombre" maxlength="150">
                            <div class="form-text">Solo letras y espacios.</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo <span class="text-muted small">(opcional)</span></label>
                        <input type="email" class="form-control" id="usuario-correo" maxlength="150">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Perfil <span class="text-danger">*</span></label>
                            <select class="form-select" id="usuario-perfil"></select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estado</label>
                            <select class="form-select" id="usuario-estado">
                                <option value="1">Activo</option>
                                <option value="0">Inactivo</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Clave <span class="text-danger" id="asterisco-clave">*</span></label>
                        <input type="password" class="form-control" id="usuario-clave" autocomplete="new-password">
                        <div class="form-text" id="ayuda-clave">Mínimo 4 caracteres.</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-marca" id="btn-guardar-usuario">Guardar</button>
            </div>
        </div>
    </div>
</div>
