<div class="d-flex justify-content-between align-items-start mb-1">
    <div>
        <h1 class="h4 mb-1">Reporte - Compras por proveedor</h1>
        <p class="text-muted small mb-0">Entradas de mercadería agrupadas por proveedor en el período elegido.</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" id="btn-excel"><i class="bi bi-file-earmark-spreadsheet me-1"></i>Excel</button>
        <button class="btn btn-sm btn-outline-secondary" id="btn-pdf"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</button>
    </div>
</div>

<div id="tarjetas-compras" class="mt-3"></div>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-bar-chart me-1"></i>Total comprado por proveedor</div>
    <div class="card-body"><canvas id="grafico-compras" style="max-height: 260px;"></canvas></div>
</div>

<div class="card mb-4">
    <div class="card-header bg-white fw-medium"><i class="bi bi-funnel me-1"></i>Filtros</div>
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small">Proveedor</label>
                <select class="form-select form-select-sm" id="f-proveedor"><option value="">Todos</option></select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Desde</label>
                <input type="date" class="form-control form-control-sm" id="f-desde">
            </div>
            <div class="col-md-2">
                <label class="form-label small">Hasta</label>
                <input type="date" class="form-control form-control-sm" id="f-hasta">
            </div>
            <div class="col-md-3">
                <label class="form-label small">Buscar proveedor</label>
                <input type="text" class="form-control form-control-sm" id="f-buscar" placeholder="Nombre…">
            </div>
            <div class="col-md-2">
                <label class="form-label small">Ordenar por</label>
                <select class="form-select form-select-sm" id="f-orden">
                    <option value="total">Total</option>
                    <option value="unidades">Unidades</option>
                    <option value="movimientos">N° compras</option>
                </select>
            </div>
            <div class="col-12">
                <button class="btn btn-marca btn-sm" id="btn-aplicar"><i class="bi bi-search me-1"></i>Aplicar</button>
                <button class="btn btn-outline-secondary btn-sm" id="btn-limpiar">Limpiar</button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header"><i class="bi bi-list-ul me-1"></i>Detalle por proveedor</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Proveedor</th>
                    <th class="text-end">N° compras</th>
                    <th class="text-end">Unidades</th>
                    <th class="text-end">Total comprado</th>
                </tr>
            </thead>
            <tbody id="tabla-compras"></tbody>
        </table>
    </div>
</div>
