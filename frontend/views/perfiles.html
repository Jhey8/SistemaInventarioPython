<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Perfiles</h1>
    <button class="btn btn-marca btn-sm" id="btn-nuevo-perfil">
        <i class="bi bi-plus-lg me-1"></i>Nuevo perfil
    </button>
</div>

<div id="tarjetas-perfiles"></div>

<div class="card">
    <div class="card-header"><i class="bi bi-shield-lock me-1"></i>Listado de perfiles</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Perfil</th>
                    <th>Descripción</th>
                    <th class="text-center">Módulos</th>
                    <th class="text-center">Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-perfiles"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modal-perfil" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h6" id="titulo-perfil">Nuevo perfil</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger d-none" id="error-perfil"></div>
                <form id="form-perfil">
                    <input type="hidden" id="perfil-id">
                    <div class="mb-3">
                        <label class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="perfil-nombre"
                               maxlength="80" placeholder="Ej. Almacenero">
                        <div class="form-text">Solo letras y espacios.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción <span class="text-muted small">(opcional)</span></label>
                        <input type="text" class="form-control" id="perfil-descripcion" maxlength="200">
                    </div>
                    <label class="form-label">Módulos que puede ver <span class="text-danger">*</span></label>
                    <div class="row row-cols-2 g-2" id="lista-modulos"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-marca" id="btn-guardar-perfil">Guardar</button>
            </div>
        </div>
    </div>
</div>
