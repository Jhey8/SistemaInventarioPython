<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Productos</h1>
    <button class="btn btn-marca btn-sm" id="btn-nuevo">
        <i class="bi bi-plus-lg me-1"></i>Nuevo producto
    </button>
</div>

<div id="tarjetas-productos"></div>

<div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span><i class="bi bi-boxes me-1"></i>Listado de productos</span>
        <div class="input-group input-group-buscar" style="max-width: 360px;">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="buscador" placeholder="Buscar por nombre o categoría">
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th class="text-end">Cantidad</th>
                    <th class="text-end">Precio</th>
                    <th class="text-end">Valor</th>
                    <th class="text-center">Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modal-producto" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title h6" id="titulo-modal">Nuevo producto</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger d-none" id="error-form"></div>
                <form id="form-producto">
                    <input type="hidden" id="producto-id">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="campo-nombre">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" id="campo-categoria"></select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Vencimiento <span
                                    class="text-muted small">(opcional)</span></label>
                            <input type="date" class="form-control" id="campo-vencimiento">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-4 mb-3">
                            <label class="form-label">Cantidad</label>
                            <input type="number" min="0" class="form-control" id="campo-cantidad" value="0">
                        </div>
                        <div class="col-4 mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" min="0" step="0.01" class="form-control" id="campo-precio" value="0">
                        </div>
                        <div class="col-4 mb-3">
                            <label class="form-label">Stock mín.</label>
                            <input type="number" min="0" class="form-control" id="campo-minimo" value="5">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-marca" id="btn-guardar">Guardar</button>
            </div>
        </div>
    </div>
</div>
