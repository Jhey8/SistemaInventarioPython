<div class="d-flex justify-content-between align-items-start mb-1">
    <div>
        <h1 class="h4 mb-1">Reporte - Valorizado de inventario</h1>
        <p class="text-muted small mb-0">Valor del stock agrupado por categoría y ranking de productos.</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" id="btn-excel"><i
                class="bi bi-file-earmark-spreadsheet me-1"></i>Excel</button>
        <button class="btn btn-sm btn-outline-secondary" id="btn-pdf"><i
                class="bi bi-file-earmark-pdf me-1"></i>PDF</button>
    </div>
</div>

<div id="tarjetas-valorizado" class="mt-3"></div>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-bar-chart me-1"></i>Valor por categoría</div>
    <div class="card-body"><canvas id="grafico-valorizado" style="max-height: 280px;"></canvas></div>
</div>

<div class="card mb-4">
    <div class="card-header bg-white fw-medium"><i class="bi bi-funnel me-1"></i>Filtros</div>
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small">Buscar categoría</label>
                <input type="text" class="form-control form-control-sm" id="f-buscar" placeholder="Nombre…">
            </div>
            <div class="col-md-3">
                <label class="form-label small">Ordenar por</label>
                <select class="form-select form-select-sm" id="f-orden">
                    <option value="valor">Valor</option>
                    <option value="unidades">Unidades</option>
                    <option value="productos">N° productos</option>
                    <option value="precio_promedio">Precio promedio</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Dirección</label>
                <select class="form-select form-select-sm" id="f-direccion">
                    <option value="desc">Mayor a menor</option>
                    <option value="asc">Menor a mayor</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Valor mínimo</label>
                <input type="number" min="0" class="form-control form-control-sm" id="f-min" placeholder="0">
            </div>
            <div class="col-md-2">
                <label class="form-label small">Top productos</label>
                <input type="number" min="1" max="20" class="form-control form-control-sm" id="f-top" value="5">
            </div>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header bg-white fw-medium"><i class="bi bi-diagram-3 me-1"></i>Por categoría</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Categoría</th>
                            <th class="text-end">Productos</th>
                            <th class="text-end">Unidades</th>
                            <th class="text-end">Precio prom.</th>
                            <th class="text-end">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-categorias"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="col-lg-5">
        <div class="card">
            <div class="card-header bg-white fw-medium"><i class="bi bi-trophy me-1"></i>Top productos por valor</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Producto</th>
                            <th class="text-end">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-top"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
